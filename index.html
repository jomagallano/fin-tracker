<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barya Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --pandan: #1A9452;
  --pandan-dark: #147a42;
  --pandan-light: #e6f5ee;
  --gumamela: #E84A4A;
  --gumamela-light: #fdeaea;
  --calamansi: #F2C12E;
  --calamansi-dark: #a07800;
  --calamansi-light: #fef8e1;
  --sinag: #FDFAF0;
  --sinag-dark: #f0ebe0;
  --text-dark: #1a1a1a;
  --text-mid: #555;
  --text-light: #999;
  --border: #e5dfd4;
  --white: #ffffff;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --radius: 14px;
  --radius-sm: 9px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sinag);
  color: var(--text-dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────────── */
header { background: var(--pandan); position: sticky; top: 0; z-index: 100; }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; }
.header-wordmark { font-family: 'Cinzel', serif; font-size: 19px; font-weight: 700; color: white; letter-spacing: 0.05em; }
.header-context { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 400; }
.header-accent-stripe { height: 4px; background: var(--gumamela); }

/* ── MAIN ───────────────────────────────────────── */
main { flex: 1; overflow-y: auto; padding-bottom: 108px; }
.tab-panel { display: none; padding: 16px; }
.tab-panel.active { display: block; }

/* ── BOTTOM NAV ─────────────────────────────────── */
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--white); border-top: 1px solid var(--border); z-index: 100;
}
.maker-bar {
  text-align: center; padding: 3px 0 2px;
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px;
  color: var(--text-light); border-bottom: 1px solid var(--border);
}
.nav-tabs { display: flex; justify-content: space-around; }
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 7px 2px 8px; cursor: pointer; border: none; background: none;
  color: var(--text-light); font-family: 'DM Sans', sans-serif; font-size: 10px; gap: 1px; transition: color 0.2s;
}
.nav-icon { font-size: 19px; line-height: 1; }
.nav-tab.active { color: var(--pandan); }

/* ── FAB ────────────────────────────────────────── */
#fab {
  position: fixed; bottom: 82px; right: 16px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--pandan); color: white; font-size: 30px; border: none;
  cursor: pointer; box-shadow: 0 4px 18px rgba(26,148,82,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 99; transition: transform 0.15s; line-height: 1;
}
#fab:active { transform: scale(0.93); }
@media (min-width: 480px) { #fab { right: calc(50% - 240px + 16px); } }

/* ── CARDS & TITLES ─────────────────────────────── */
.card { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--pandan); margin-bottom: 12px; }
.card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.card-row .section-title { margin: 0; }

/* ── TRANSACTION LOG ────────────────────────────── */
.month-group { margin-bottom: 20px; }
.month-header {
  font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600;
  color: var(--text-mid); margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline;
}
.month-net { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; }
.txn-item {
  display: flex; align-items: center; gap: 11px; padding: 11px 13px;
  background: white; border-radius: var(--radius-sm); margin-bottom: 7px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.12s;
}
.txn-item:active { transform: scale(0.985); }
.txn-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.txn-dot.income  { background: var(--pandan); }
.txn-dot.expense { background: var(--gumamela); }
.txn-dot.savings { background: var(--calamansi); }
.txn-info { flex: 1; min-width: 0; }
.txn-main { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
.txn-category { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-amount { font-size: 14px; font-weight: 700; flex-shrink: 0; }
.txn-amount.income  { color: var(--pandan); }
.txn-amount.expense { color: var(--gumamela); }
.txn-amount.savings { color: var(--calamansi-dark); }
.txn-sub { display: flex; gap: 5px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
.txn-date { font-size: 11px; color: var(--text-light); }
.txn-note { font-size: 11px; color: var(--text-light); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag { font-size: 10px; background: var(--sinag-dark); color: var(--text-mid); padding: 1px 7px; border-radius: 20px; white-space: nowrap; }
.tag.auto   { background: var(--pandan-light); color: var(--pandan); }
.tag.manual { background: var(--calamansi-light); color: var(--calamansi-dark); }
.tag.sub    { background: #f0e8ff; color: #6030b0; }

/* ── EMPTY STATE ────────────────────────────────── */
.empty-state { text-align: center; padding: 44px 20px; color: var(--text-light); }
.empty-icon { font-size: 42px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ── MODAL ──────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.48); z-index: 200;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 20px 20px 0 0;
  width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
  padding: 20px 20px 36px;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; margin-bottom: 18px; color: var(--pandan); }

/* ── FORMS ──────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
label { display: block; font-size: 11px; font-weight: 600; color: var(--text-light); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
input, select, textarea {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px;
  color: var(--text-dark); background: var(--sinag); outline: none; transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--pandan); }
textarea { resize: vertical; min-height: 64px; }
.type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.type-btn {
  flex: 1; padding: 10px 6px; border: 2px solid var(--border); border-radius: var(--radius-sm);
  background: white; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.18s; color: var(--text-mid);
}
.type-btn.active.expense { border-color: var(--gumamela); background: var(--gumamela-light); color: var(--gumamela); font-weight: 700; }
.type-btn.active.income  { border-color: var(--pandan); background: var(--pandan-light); color: var(--pandan); font-weight: 700; }
.type-btn.active.savings { border-color: var(--calamansi); background: var(--calamansi-light); color: var(--calamansi-dark); font-weight: 700; }

/* ── BUTTONS ────────────────────────────────────── */
.btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.18s; }
.btn:active { opacity: 0.82; }
.btn-primary { background: var(--pandan); color: white; }
.btn-danger  { background: var(--gumamela); color: white; }
.btn-ghost   { background: none; border: 1.5px solid var(--border); color: var(--text-mid); }
.btn-row { display: flex; gap: 8px; margin-top: 16px; }
.btn-row .btn { flex: 1; width: auto; }
.btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }

/* ── DASHBOARD ──────────────────────────────────── */
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.summary-card { background: white; border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
.summary-card .s-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.summary-card .s-value { font-size: 17px; font-weight: 700; line-height: 1.1; }
.s-value.c-income   { color: var(--pandan); }
.s-value.c-expense  { color: var(--gumamela); }
.s-value.c-savings  { color: var(--calamansi-dark); }
.s-value.c-positive { color: var(--pandan); }
.s-value.c-negative { color: var(--gumamela); }

.pill-tabs { display: flex; background: var(--sinag-dark); border-radius: 22px; padding: 3px; margin-bottom: 16px; }
.pill-tab {
  flex: 1; text-align: center; padding: 8px; border-radius: 20px;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  color: var(--text-mid); border: none; background: none; font-family: 'DM Sans', sans-serif;
}
.pill-tab.active { background: white; color: var(--pandan); box-shadow: 0 1px 5px rgba(0,0,0,0.1); font-weight: 700; }

.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.month-nav-btn {
  padding: 7px 16px; border: 1.5px solid var(--border); border-radius: 22px;
  background: white; cursor: pointer; font-size: 17px; color: var(--pandan); transition: background 0.2s; line-height: 1;
}
.month-nav-btn:active { background: var(--pandan-light); }
.month-nav-label { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; }
.chart-wrap { position: relative; }

/* ── CATEGORY DRILL-DOWN ────────────────────────── */
.cat-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background 0.15s; gap: 8px;
}
.cat-row:last-child { border-bottom: none; }
.cat-row:active { background: var(--sinag-dark); margin: 0 -16px; padding: 9px 16px; border-radius: 6px; }
.cat-row-left { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-name { font-size: 14px; font-weight: 600; }
.cat-row-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.cat-pct { font-size: 12px; color: var(--text-light); min-width: 30px; text-align: right; }
.cat-amt { font-size: 14px; font-weight: 700; color: var(--gumamela); min-width: 72px; text-align: right; }
.cat-chevron { font-size: 13px; color: var(--text-light); width: 14px; text-align: center; transition: transform 0.2s; }
.cat-chevron.open { transform: rotate(90deg); }

.subcat-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0 6px 20px; gap: 8px; animation: fadeIn 0.15s ease;
}
.subcat-bar-wrap { flex: 1; min-width: 0; }
.subcat-name { font-size: 12px; color: var(--text-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.subcat-bar { height: 4px; background: var(--sinag-dark); border-radius: 2px; overflow: hidden; }
.subcat-bar-fill { height: 100%; border-radius: 2px; opacity: 0.6; }
.subcat-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.subcat-pct { font-size: 11px; color: var(--text-light); min-width: 28px; text-align: right; }
.subcat-amt { font-size: 12px; font-weight: 600; color: var(--gumamela); min-width: 68px; text-align: right; }

@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.budget-item { margin-bottom: 14px; }
.budget-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; align-items: baseline; }
.budget-cat-name { font-weight: 600; }
.budget-amounts { font-size: 12px; }
.budget-track { height: 7px; background: var(--sinag-dark); border-radius: 3px; overflow: hidden; }
.budget-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.budget-fill.safe    { background: var(--pandan); }
.budget-fill.warning { background: var(--calamansi); }
.budget-fill.over    { background: var(--gumamela); }
.budget-pct { font-size: 11px; color: var(--text-light); margin-top: 3px; text-align: right; }

/* ── TYPE PICKER ────────────────────────────────── */
.type-pick-btn {
  display: flex; align-items: center; gap: 14px; padding: 14px 16px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  background: white; cursor: pointer; text-align: left; width: 100%;
  font-family: 'DM Sans', sans-serif; transition: border-color 0.18s, background 0.18s;
}
.type-pick-btn:active { border-color: var(--pandan); background: var(--pandan-light); }
.type-pick-icon { font-size: 26px; flex-shrink: 0; line-height: 1; }
.type-pick-label { font-size: 15px; font-weight: 600; color: var(--text-dark); }
.type-pick-desc  { font-size: 12px; color: var(--text-light); margin-top: 2px; line-height: 1.4; }

/* ── INSTALLMENT CALC CARD ──────────────────────── */
.install-calc {
  background: var(--pandan-light); border-radius: var(--radius-sm);
  padding: 12px 14px; margin-bottom: 14px;
}
.install-calc-row {
  display: flex; justify-content: space-between; font-size: 13px;
  padding: 3px 0; border-bottom: 1px solid rgba(26,148,82,0.15);
}
.install-calc-row:last-child { border-bottom: none; padding-top: 6px; font-weight: 700; }
.install-calc-label { color: var(--pandan-dark); }
.install-calc-val   { font-weight: 600; color: var(--pandan-dark); }
.bills-tabs { display: flex; background: var(--sinag-dark); border-radius: 22px; padding: 3px; margin-bottom: 16px; }
.bills-tab {
  flex: 1; text-align: center; padding: 7px 4px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  color: var(--text-mid); border: none; background: none;
  font-family: 'DM Sans', sans-serif; white-space: nowrap;
}
.bills-tab.active { background: white; color: var(--pandan); box-shadow: 0 1px 5px rgba(0,0,0,0.1); font-weight: 700; }
.bills-tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--gumamela); color: white;
  font-size: 9px; font-weight: 700; margin-left: 4px; vertical-align: middle;
}
.com-section-label {
  font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600;
  color: var(--text-mid); margin: 18px 0 10px; display: flex; align-items: center; gap: 8px;
}

/* checklist items (manual payments) */
.check-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 13px;
  background: white; border-radius: var(--radius-sm); margin-bottom: 8px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.05);
}
.check-item.is-paid { opacity: 0.6; }
.check-item.is-overdue { border-left: 3px solid var(--gumamela); }

.check-box {
  width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; background: white;
}
.check-box:hover { border-color: var(--pandan); }
.check-box.checked { background: var(--pandan); border-color: var(--pandan); }
.check-box.checked::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; line-height: 1; }
.check-box.overdue { border-color: var(--gumamela); }

.check-info { flex: 1; min-width: 0; cursor: pointer; }
.check-name { font-size: 14px; font-weight: 600; }
.check-meta { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.check-amount { font-size: 14px; font-weight: 700; color: var(--gumamela); flex-shrink: 0; }
.check-amount.zero { color: var(--text-light); font-style: italic; }
.overdue-badge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; background: var(--gumamela-light); color: var(--gumamela); margin-left: 4px; }
.paid-badge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; background: var(--pandan-light); color: var(--pandan); margin-left: 4px; }

/* standard commitment items (non-checklist) */
.com-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; background: white; border-radius: var(--radius-sm);
  margin-bottom: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); cursor: pointer; gap: 10px;
}
.com-left { flex: 1; min-width: 0; }
.com-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.com-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.com-right { text-align: right; flex-shrink: 0; }
.com-amount { font-size: 15px; font-weight: 700; color: var(--gumamela); }
.com-amount.zero { color: var(--text-light); font-style: italic; font-size: 13px; }
.com-due { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.due-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-top: 3px; }
.due-badge.overdue  { background: var(--gumamela-light); color: var(--gumamela); }
.due-badge.due-soon { background: var(--calamansi-light); color: var(--calamansi-dark); }
.log-btn { display: inline-block; margin-top: 4px; padding: 3px 10px; border-radius: 20px; border: none; background: var(--pandan); color: white; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* ── SAVINGS ────────────────────────────────────── */
.goal-card { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; }
.goal-name { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
.goal-amounts { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-mid); margin-bottom: 10px; }
.goal-track { height: 8px; background: var(--sinag-dark); border-radius: 4px; overflow: hidden; }
.goal-fill { height: 100%; background: var(--pandan); border-radius: 4px; transition: width 0.4s ease; }
.goal-fill.done { background: var(--calamansi); }
.goal-pct { font-size: 12px; color: var(--text-light); margin-top: 5px; }

/* ── SETTINGS ───────────────────────────────────── */
.settings-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.settings-label { font-size: 15px; }
.settings-chevron { color: var(--text-light); font-size: 18px; }
.settings-section-title { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; color: var(--text-light); margin: 18px 0 6px; text-transform: uppercase; letter-spacing: 0.07em; }
.budget-limit-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.budget-limit-cat { font-size: 14px; font-weight: 500; }
.budget-limit-val { font-size: 14px; color: var(--pandan); font-weight: 700; }
.budget-limit-actions { display: flex; gap: 6px; margin-left: 10px; }
.signature-block { text-align: center; padding: 28px 20px 10px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: var(--text-light); }

/* ── ALERTS ─────────────────────────────────────── */
.alert-banner { padding: 11px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 11px; display: flex; gap: 8px; align-items: flex-start; line-height: 1.5; }
.alert-banner.warning { background: var(--calamansi-light); color: var(--calamansi-dark); }
.alert-banner.danger  { background: var(--gumamela-light); color: #b00; }
.alert-banner.info    { background: var(--sinag-dark); color: var(--text-mid); }
.tight-month-banner { background: linear-gradient(135deg, var(--gumamela-light), var(--calamansi-light)); border: 1px solid var(--calamansi); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px; font-size: 13px; line-height: 1.6; }

/* ── TOGGLE ─────────────────────────────────────── */
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; transition: 0.3s; cursor: pointer; }
.toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.3s; }
.toggle input:checked + .toggle-slider { background: var(--pandan); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

/* ── CLIPBOARD ──────────────────────────────────── */
.clipboard-area { background: var(--sinag-dark); border-radius: var(--radius-sm); padding: 13px; font-size: 12px; font-family: monospace; white-space: pre-wrap; max-height: 220px; overflow-y: auto; margin-bottom: 12px; color: var(--text-mid); }

/* ── SETTINGS LIST ──────────────────────────────── */
.edit-list-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.edit-list-item span { font-size: 14px; flex: 1; }
.btn-icon { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
.btn-icon.remove { background: var(--gumamela-light); color: var(--gumamela); }
.btn-icon.add-ic { background: var(--pandan-light); color: var(--pandan); }
.tags-display { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
</style>
</head>

<!-- ══ MODALS ══════════════════════════════════════ -->

<!-- ADD / EDIT TRANSACTION -->
<div class="modal-overlay" id="modal-txn">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="txn-title">Add Transaction</div>
    <div class="type-toggle">
      <button class="type-btn active expense" onclick="setTxnType('expense')">Expense</button>
      <button class="type-btn income"         onclick="setTxnType('income')">Income</button>
      <button class="type-btn savings"        onclick="setTxnType('savings')">Savings</button>
    </div>
    <div class="form-group">
      <label>Amount (₱)</label>
      <input type="number" id="txn-amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
    </div>
    <div id="expense-fields">
      <div class="form-group">
        <label>Category</label>
        <select id="txn-cat" onchange="onCatChange()">
          <option value="">Select category</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subcategory</label>
        <select id="txn-sub" onchange="onSubChange()">
          <option value="">Select subcategory</option>
        </select>
      </div>
      <div class="form-group" id="tags-row" style="display:none">
        <label>Tags</label>
        <div class="tags-display" id="txn-tags-display"></div>
      </div>
      <div class="form-group" id="pay-method-row" style="display:none">
        <label>Payment Method</label>
        <select id="txn-pay-method">
          <option value="">Select method</option>
        </select>
      </div>
    </div>
    <div id="income-fields" style="display:none">
      <div class="form-group">
        <label>Income Source</label>
        <select id="txn-income-src">
          <option value="">Select source</option>
        </select>
      </div>
    </div>
    <div id="savings-fields" style="display:none">
      <div class="form-group">
        <label>Savings Goal</label>
        <select id="txn-goal">
          <option value="">Select goal</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="txn-date">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="txn-notes" placeholder="Optional notes…"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('modal-txn')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTxn()">Save</button>
    </div>
    <div class="btn-row" id="txn-del-row" style="display:none; margin-top:6px">
      <button class="btn btn-danger" onclick="deleteTxn()">Delete</button>
    </div>
  </div>
</div>

<!-- COMMITMENT TYPE PICKER -->
<div class="modal-overlay" id="modal-com-type">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">What type of commitment?</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      <button class="type-pick-btn" onclick="openAddComWithType('manual-payment')">
        <span class="type-pick-icon">✍️</span>
        <div><div class="type-pick-label">Manual Payment</div><div class="type-pick-desc">Bills you pay yourself — utilities, insurance, RPT, etc.</div></div>
      </button>
      <button class="type-pick-btn" onclick="openAddComWithType('auto-payment')">
        <span class="type-pick-icon">⚡</span>
        <div><div class="type-pick-label">Auto-Payment / Subscription</div><div class="type-pick-desc">Auto-debited bills or recurring subscriptions</div></div>
      </button>
      <button class="type-pick-btn" onclick="openAddComWithType('installment')">
        <span class="type-pick-icon">📦</span>
        <div><div class="type-pick-label">Installment</div><div class="type-pick-desc">Loans and credit card installments with fixed terms</div></div>
      </button>
    </div>
    <button class="btn btn-ghost" onclick="closeModal('modal-com-type')">Cancel</button>
  </div>
</div>

<!-- ADD / EDIT COMMITMENT -->
<div class="modal-overlay" id="modal-com">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="com-title">Add Commitment</div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="com-name" placeholder="e.g. Netflix, Meralco, Mortgage">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="com-type" onchange="onComTypeChange()">
        <option value="manual-payment">Manual Payment</option>
        <option value="auto-payment">Auto-Payment</option>
        <option value="subscription">Subscription</option>
        <option value="installment">Installment</option>
      </select>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="com-cat" onchange="onComCatChange()">
        <option value="">Select category</option>
      </select>
    </div>
    <div class="form-group">
      <label>Subcategory</label>
      <select id="com-sub">
        <option value="">Select subcategory</option>
      </select>
    </div>
    <!-- Standard amount — hidden for installments -->
    <div class="form-group" id="com-amount-row">
      <label>Amount (₱)</label>
      <input type="number" id="com-amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
    </div>
    <!-- Billing cycle — hidden for installments -->
    <div class="form-group" id="com-cycle-row">
      <label>Billing Cycle</label>
      <select id="com-cycle">
        <option value="monthly">Monthly</option>
        <option value="quarterly">Quarterly</option>
        <option value="annual">Annual</option>
      </select>
    </div>
    <div class="form-group">
      <label>Next Due Date</label>
      <input type="date" id="com-due">
    </div>
    <!-- INSTALLMENT-ONLY FIELDS -->
    <div id="installment-fields" style="display:none">
      <div class="form-group">
        <label>Principal Amount (₱) <span style="font-weight:400;color:var(--text-light)">— total amount borrowed</span></label>
        <input type="number" id="com-principal" placeholder="0.00" step="0.01" min="0" inputmode="decimal" oninput="updateInstallmentCalc()">
      </div>
      <div class="form-group">
        <label>Total Repayment Amount (₱) <span style="font-weight:400;color:var(--text-light)">— principal + all interest</span></label>
        <input type="number" id="com-total-repay" placeholder="0.00" step="0.01" min="0" inputmode="decimal" oninput="updateInstallmentCalc()">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group" style="margin:0">
          <label>Total Terms</label>
          <input type="number" id="com-total-terms" placeholder="e.g. 240" min="1" inputmode="numeric" oninput="updateInstallmentCalc()">
        </div>
        <div class="form-group" style="margin:0">
          <label>Remaining Terms</label>
          <input type="number" id="com-rem-terms" placeholder="e.g. 215" min="0" inputmode="numeric" oninput="updateInstallmentCalc()">
        </div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label>Start Date <span style="font-weight:400;color:var(--text-light)">— informational</span></label>
        <input type="date" id="com-start-date" oninput="updateInstallmentCalc()">
      </div>
      <!-- Live calc summary -->
      <div id="installment-calc" style="display:none;margin:14px 0 4px"></div>
    </div>
    <div class="form-group">
      <label>Payment Source</label>
      <select id="com-pay-src">
        <option value="">Select source</option>
      </select>
    </div>
    <!-- Hidden for installments -->
    <div id="com-tight-row" class="toggle-row" style="border-bottom:1px solid var(--border)">
      <span style="font-size:14px">Cancel if budget is tight</span>
      <label class="toggle">
        <input type="checkbox" id="com-cancel-tight">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('modal-com')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCom()">Save</button>
    </div>
    <div class="btn-row" id="com-del-row" style="display:none; margin-top:6px">
      <button class="btn btn-danger" onclick="deleteCom()">Delete</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT SAVINGS GOAL -->
<div class="modal-overlay" id="modal-goal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="goal-title">New Savings Goal</div>

    <div class="form-group">

    <div class="btn-row" id="goal-del-row" style="display:none; margin-top:6px">

</div>

<!-- PAYMENT CONFIRM (for commitments) -->

    <div class="modal-handle"></div>

      <label>Payment Method</label>
      <select id="confirm-pay-src">
        <option value="">Select method</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="confirm-date">
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>

<!-- CLIPBOARD / AI ANALYSIS -->
<div class="modal-overlay" id="modal-clipboard">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">AI Analysis</div>
    <p style="font-size:13px; color:var(--text-mid); margin-bottom:14px; line-height:1.6">Copy the summary below and paste it into Claude.ai for financial analysis and personalized insights.</p>
    <div class="clipboard-area" id="clipboard-data"></div>
    <button class="btn btn-primary" onclick="copyClipboard()">📋 Copy to Clipboard</button>

<!-- SETTINGS: MANAGE LIST -->
<div class="modal-overlay" id="modal-settings-list">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="sl-title">Manage</div>
    <div id="sl-content"></div>
    <button class="btn btn-ghost" style="margin-top:18px" onclick="closeModal('modal-settings-list')">Done</button>
  </div>
</div>

<!-- BUDGET: SET / EDIT LIMIT -->
<div class="modal-overlay" id="modal-budget">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="budget-modal-title">Set Budget Limit</div>
    <div class="form-group">
      <label>Category</label>
      <select id="budget-cat">
        <option value="">Select category</option>
      </select>
    </div>
    <div class="form-group">
      <label>Monthly Limit (₱)</label>
      <input type="number" id="budget-limit" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
    </div>
    <div class="form-group">
      <label>Warn at (%)</label>
      <input type="number" id="budget-warn" value="80" min="10" max="100" inputmode="numeric">
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('modal-budget')">Cancel</button>
      <button class="btn btn-primary" onclick="saveBudget()">Save</button>
    </div>
    <div class="btn-row" id="budget-del-row" style="display:none; margin-top:6px">
      <button class="btn btn-danger" onclick="deleteBudget()">Remove Limit</button>
    </div>
  </div>
</div>

<!-- CSV REVIEW MODAL -->
<div class="modal-overlay" id="modal-csv-review">
  <div class="modal" style="max-height:92vh">
    <div class="modal-handle"></div>
    <div class="modal-title">Review Import</div>
    <div id="csv-review-summary" style="font-size:13px;color:var(--text-mid);margin-bottom:14px;line-height:1.6"></div>
    <div id="csv-review-content" style="max-height:52vh;overflow-y:auto;padding-right:2px"></div>
    <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:10px">
      <div id="csv-review-counts" style="font-size:12px;color:var(--text-light);margin-bottom:12px;text-align:center"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal('modal-csv-review')">Cancel</button>
        <button class="btn btn-primary" onclick="finalizeCsvImport()">Import</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════

const STORAGE_KEY = 'barya_tracker_v1';

const DEFAULT_CATS = {
  'Food':          ['Drinks','Dine-in','GrabFood','To-Go','Grocery'],
  'Personal Care': ['Bag & Clothes','Grooming','Make-up','Shoes','Skincare'],
  'Lifestyle':     ['Entertainment','Hotel','Travel'],
  'People':        ['Gift','Parents','Tithes','Family'],
  'Utilities':     ['Association Dues','Electricity','RED Internet','StarLink Internet','Phone Bill','Shared Real Property Tax','Unit Real Property Tax'],
  'Health':        ['Check-Up','Medicine','Membership','Sports'],
  'Household':     ['Home Improvements','Home Maintenance','Laundry'],
  'Insurance':     ['Burial Insurance','Home Insurance','Life Insurance'],
  'Debt':          ['Mortgage','Laptop Installments','IKEA Installments','Interest Charges'],
  'Subscription':  ['Canva','Google One','iCloud','YouTube','Netflix','Claude'],
  'Transportation':['Commute','Grab','InDrive','GSM']
};

const DEFAULT_SUB_TAGS = {
  'Drinks':['#variable-expense'],'Dine-in':['#variable-expense'],'GrabFood':['#variable-expense'],
  'To-Go':['#variable-expense'],'Grocery':['#variable-expense'],
  'Bag & Clothes':['#variable-expense'],'Grooming':['#variable-expense'],'Make-up':['#variable-expense'],
  'Shoes':['#variable-expense'],'Skincare':['#variable-expense'],
  'Entertainment':['#variable-expense'],'Hotel':['#variable-expense'],'Travel':['#variable-expense'],
  'Gift':['#variable-expense'],'Parents':['#variable-expense'],'Tithes':['#variable-expense'],'Family':['#variable-expense'],
  'Association Dues':['#manual-payment'],'Electricity':['#manual-payment'],'RED Internet':['#manual-payment'],
  'StarLink Internet':['#auto-payment'],'Phone Bill':['#manual-payment'],
  'Shared Real Property Tax':['#manual-payment'],'Unit Real Property Tax':['#manual-payment'],
  'Check-Up':['#variable-expense'],'Medicine':['#variable-expense'],'Membership':['#variable-expense'],'Sports':['#variable-expense'],
  'Home Improvements':['#variable-expense'],'Home Maintenance':['#variable-expense'],'Laundry':['#variable-expense'],
  'Burial Insurance':['#manual-payment'],'Home Insurance':['#manual-payment'],'Life Insurance':['#auto-payment'],
  'Mortgage':['#manual-payment','#installment'],
  'Laptop Installments':['#auto-payment','#installment'],
  'IKEA Installments':['#auto-payment','#installment'],
  'Interest Charges':[],
  'Canva':['#subscription','#auto-payment'],'Google One':['#subscription','#auto-payment'],
  'iCloud':['#subscription','#auto-payment'],'YouTube':['#subscription','#auto-payment'],
  'Netflix':['#subscription','#auto-payment'],'Claude':['#subscription','#auto-payment'],
  'Commute':['#variable-expense'],'Grab':['#variable-expense'],'InDrive':['#variable-expense'],'GSM':['#variable-expense']
};

function fomStr() {
  // first of current month
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-01';
}

function mkPreset(id, name, type, category, subcategory, billingCycle, extra) {
  return Object.assign({
    id, name, type, category, subcategory,
    amount: 0, billingCycle: billingCycle || 'monthly',
    nextDueDate: fomStr(),
    paymentSource: '', cancelIfTight: false
  }, extra || {});
}

function defaultData() {
  return {
    transactions: [],
    commitments: [
      // — SUBSCRIPTIONS (auto-payment)
      mkPreset('ps_canva',   'Canva',      'subscription', 'Subscription', 'Canva',      'monthly'),
      mkPreset('ps_g1',      'Google One', 'subscription', 'Subscription', 'Google One', 'monthly'),
      mkPreset('ps_icloud',  'iCloud',     'subscription', 'Subscription', 'iCloud',     'monthly'),
      mkPreset('ps_yt',      'YouTube',    'subscription', 'Subscription', 'YouTube',    'monthly'),
      mkPreset('ps_nflx',    'Netflix',    'subscription', 'Subscription', 'Netflix',    'monthly'),
      mkPreset('ps_claude',  'Claude',     'subscription', 'Subscription', 'Claude',     'monthly'),
      // — AUTO-PAYMENTS
      mkPreset('ps_slnk',   'StarLink Internet', 'auto-payment', 'Utilities', 'StarLink Internet', 'monthly'),
      mkPreset('ps_lifeins','Life Insurance',     'auto-payment', 'Insurance', 'Life Insurance',    'monthly'),
      // — INSTALLMENTS
      mkPreset('ps_laptop', 'Laptop Installments', 'installment', 'Debt', 'Laptop Installments', 'monthly', { totalTerms:0, remainingTerms:0 }),
      mkPreset('ps_ikea',   'IKEA Installments',   'installment', 'Debt', 'IKEA Installments',   'monthly', { totalTerms:0, remainingTerms:0 }),
      mkPreset('ps_mtg',    'Mortgage',            'installment', 'Debt', 'Mortgage',            'monthly', { totalTerms:0, remainingTerms:0 }),
      // — MANUAL PAYMENTS (checklist)
      mkPreset('ps_assoc',  'Association Dues',         'manual-payment', 'Utilities', 'Association Dues',         'monthly'),
      mkPreset('ps_elec',   'Electricity',              'manual-payment', 'Utilities', 'Electricity',              'monthly'),
      mkPreset('ps_red',    'RED Internet',             'manual-payment', 'Utilities', 'RED Internet',             'monthly'),
      mkPreset('ps_phone',  'Phone Bill',               'manual-payment', 'Utilities', 'Phone Bill',               'monthly'),
      mkPreset('ps_srpt',   'Shared Real Property Tax', 'manual-payment', 'Utilities', 'Shared Real Property Tax', 'annual'),
      mkPreset('ps_urpt',   'Unit Real Property Tax',   'manual-payment', 'Utilities', 'Unit Real Property Tax',   'annual'),
      mkPreset('ps_buri',   'Burial Insurance',         'manual-payment', 'Insurance', 'Burial Insurance',         'monthly'),
      mkPreset('ps_hins',   'Home Insurance',           'manual-payment', 'Insurance', 'Home Insurance',           'monthly'),
    ],
    savingsGoals: [],
    budgets: {},
    categories: JSON.parse(JSON.stringify(DEFAULT_CATS)),
    subcategoryTags: JSON.parse(JSON.stringify(DEFAULT_SUB_TAGS)),
    paymentSources: ['BPI','GCash','GoTyme'],
    incomeSources: ['Salary','Freelance','Business'],
    settings: { backupReminder: true, tightThreshold: 0 }
  };
}

let D = (function() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : defaultData();
  } catch(e) { return defaultData(); }
})();

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(D)); }

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════

function peso(n) {
  return '₱' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(s) {
  if (!s) return '';
  return new Date(s + 'T00:00:00').toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
}
function monthKey(s) { return s ? s.substring(0, 7) : ''; }
function monthLabel(k) {
  if (!k) return '';
  const [y,m] = k.split('-');
  return new Date(parseInt(y), parseInt(m)-1, 1).toLocaleDateString('en-PH', { month: 'long', year: 'numeric' });
}
function today() { return new Date().toISOString().split('T')[0]; }
function uid()   { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
function getTags(sub) { return (D.subcategoryTags && D.subcategoryTags[sub]) || DEFAULT_SUB_TAGS[sub] || []; }
function isManual(sub) { return getTags(sub).includes('#manual-payment'); }
function isFixed(sub)  { const t = getTags(sub); return t.includes('#manual-payment') || t.includes('#auto-payment') || t.includes('#installment'); }

// Commitment due-state helpers
function currentMonthKey() { return monthKey(today()); }
function comIsPaid(c) {
  // nextDueDate is in a FUTURE month = already paid this cycle
  if (!c.nextDueDate) return false;
  return monthKey(c.nextDueDate) > currentMonthKey();
}
function comIsOverdue(c) {
  if (!c.nextDueDate) return false;
  return monthKey(c.nextDueDate) < currentMonthKey();
}
function comIsDueThisMonth(c) {
  if (!c.nextDueDate) return false;
  return monthKey(c.nextDueDate) === currentMonthKey();
}

function runLogSearch() {
  const input = document.getElementById('log-search');
  if (input) logSearchQuery = input.value;
  renderLog();
}

function backupBannerHtml() {
  const s = D.settings || {};
  if (!s.backupReminder) return '';
  const last = s.lastBackupDate;
  const daysSince = last ? Math.floor((new Date(today()) - new Date(last)) / 86400000) : null;
  const needsBackup = !last || daysSince >= 7;
  if (!needsBackup) return '';
  const msg = !last
    ? "You haven't backed up yet. Export a JSON backup to keep your data safe."
    : `Last backup was ${daysSince} day${daysSince !== 1 ? 's' : ''} ago. Consider exporting a backup.`;
  return `<div id="backup-banner" class="alert-banner warning" style="margin-bottom:12px;justify-content:space-between;align-items:center">
    <span>💾 ${msg}</span>
    <button onclick="exportData()" style="border:none;background:var(--calamansi);color:var(--text-dark);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;cursor:pointer;flex-shrink:0;margin-left:8px">Back up</button>
  </div>`;
}

function renderLog() {
  const el = document.getElementById('tab-log');
  const banner = backupBannerHtml();

  // Search bar HTML (always shown)
  const searchBar = `<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">
    <div style="position:relative;flex:1">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none">🔍</span>
      <input type="text" id="log-search" placeholder="Search transactions…"
        value="${logSearchQuery.replace(/"/g,'&quot;')}"
        onkeydown="if(event.key==='Enter')runLogSearch()"
        style="width:100%;padding:10px 36px 10px 38px;border:1.5px solid var(--border);border-radius:22px;font-family:'DM Sans',sans-serif;font-size:14px;background:white;outline:none;color:var(--text-dark)"
        onfocus="this.style.borderColor='var(--pandan)'"
        onblur="this.style.borderColor='var(--border)'">
      ${logSearchQuery ? `<button onclick="logSearchQuery='';renderLog()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;font-size:18px;color:var(--text-light);line-height:1">×</button>` : ''}
    </div>
    <button onclick="runLogSearch()" style="padding:10px 18px;background:var(--pandan);color:white;border:none;border-radius:22px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0">Go</button>
  </div>`;

  const q = logSearchQuery.toLowerCase().trim();
  let txns = D.transactions.slice().sort((a,b) => b.date.localeCompare(a.date));

  // Filter only when query is 2+ characters
  if (q.length >= 2) {
    txns = txns.filter(t => {
      return (t.category||'').toLowerCase().includes(q)
          || (t.subcategory||'').toLowerCase().includes(q)
          || (t.notes||'').toLowerCase().includes(q)
          || (t.incomeSource||'').toLowerCase().includes(q)
          || (t.savingsGoalName||'').toLowerCase().includes(q)
          || (t.paymentMethod||'').toLowerCase().includes(q)
          || String(t.amount||'').includes(q)
          || (t.date||'').includes(q);
    });
  }

  if (!txns.length) {
    el.innerHTML = banner + searchBar + (q.length >= 2
      ? `<div class="empty-state"><div class="empty-icon">🔍</div><p>No transactions match<br><strong>"${logSearchQuery}"</strong></p></div>`
      : `<div class="empty-state"><div class="empty-icon">💸</div><p>No transactions yet.<br>Tap <strong>+</strong> to add your first entry.</p></div>`);
    return;
  }

  const groups = {};
  txns.forEach(t => { const mk=monthKey(t.date); if(!groups[mk]) groups[mk]=[]; groups[mk].push(t); });
  let html = banner + searchBar;

  if (q.length >= 2) {
    html += `<div style="font-size:12px;color:var(--text-light);margin-bottom:10px;text-align:center">${txns.length} result${txns.length!==1?'s':''} for "${logSearchQuery}"</div>`;
  }

  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(mk => {
    const g = groups[mk];
    const income  = g.filter(t=>t.type==='income').reduce((s,t)=>s+ +t.amount,0);
    const expense = g.filter(t=>t.type==='expense').reduce((s,t)=>s+ +t.amount,0);
    const net = income - expense;
    html += `<div class="month-group">
      <div class="month-header">
        <span>${monthLabel(mk)}</span>
        <span class="month-net" style="color:var(--${net>=0?'pandan':'gumamela'})">${net>=0?'+':''}${peso(net)}</span>
      </div>`;
    g.forEach(t => {
      const tags = t.tags || [];
      const tagHtml = tags.map(tag => {
        const cls = tag==='#auto-payment'?'auto':tag==='#manual-payment'?'manual':tag==='#subscription'?'sub':'';
        return `<span class="tag ${cls}">${tag}</span>`;
      }).join('');
      const label = t.type==='income' ? (t.incomeSource||'Income')
        : t.type==='savings' ? (t.savingsGoalName||'Savings')
        : `${t.category||''}${t.subcategory?' · '+t.subcategory:''}`;
      const sign = t.type==='income' ? '+' : '−';
      html += `<div class="txn-item" onclick="openEditTxn('${t.id}')">
        <div class="txn-dot ${t.type}"></div>
        <div class="txn-info">
          <div class="txn-main"><span class="txn-category">${label}</span><span class="txn-amount ${t.type}">${sign}${peso(t.amount)}</span></div>
          <div class="txn-sub"><span class="txn-date">${fmtDate(t.date)}</span>${tagHtml}${t.paymentMethod?`<span class="tag">${t.paymentMethod}</span>`:''}</div>
          ${t.notes?`<div class="txn-note">${t.notes}</div>`:''}
        </div>
      </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

let chartBreakdown=null, chartBreakdownYr=null, chartTrend=null, chartYearly=null;
let expandedCats = new Set();
let catBreakdownOpen = false;
let catBreakdownOpenYr = false;

function getMonthTxns(mk) { return D.transactions.filter(t=>monthKey(t.date)===mk); }
function calcSummary(txns) {
  const income  = txns.filter(t=>t.type==='income').reduce((s,t)=>s+ +t.amount,0);
  const expense = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+ +t.amount,0);
  const savings = txns.filter(t=>t.type==='savings').reduce((s,t)=>s+ +t.amount,0);
  const fixed   = txns.filter(t=>t.type==='expense'&&isFixed(t.subcategory)).reduce((s,t)=>s+ +t.amount,0);
  return { income, expense, savings, fixed, variable: expense-fixed, net: income-expense-savings };
}
function prevMonthKey(mk) {
  const [y,m] = mk.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function navDashMonth(dir) {
  const [y,m] = dashMonth.split('-').map(Number);
  const d = new Date(y, m-1+dir, 1);
  dashMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  renderDashboard(); updateHeaderCtx();
}
function renderDashboard() {
  if (dashView==='monthly') renderMonthlyDash(); else renderYearlyDash();
}

function renderMonthlyDash() {
  const el = document.getElementById('dash-content');
  const txns = getMonthTxns(dashMonth);
  const s = calcSummary(txns);
  const prev = calcSummary(getMonthTxns(prevMonthKey(dashMonth)));
  const hasPrev = prev.expense>0||prev.income>0;
  const expDiff = s.expense - prev.expense;

  const catSpend = {};
  txns.filter(t=>t.type==='expense').forEach(t => {
    catSpend[t.category||'Other'] = (catSpend[t.category||'Other']||0) + +t.amount;
  });
  const catEntries = Object.entries(catSpend).sort((a,b)=>b[1]-a[1]);

  let momHtml = '';
  if (hasPrev) {
    const cls = expDiff>0?'warning':'info';
    const icon = expDiff>0?'📈':'📉';
    momHtml = `<div class="alert-banner ${cls}">${icon} Expenses ${peso(Math.abs(expDiff))} ${expDiff>0?'more':'less'} vs. last month.</div>`;
  }

  // Budget section
  const budgets = D.budgets || {};
  const budgetEntries = Object.entries(budgets);
  let budgetHtml = '';
  if (budgetEntries.length) {
    const threshold = +((D.settings||{}).tightThreshold||0);
    const isTight = s.net < threshold && threshold > 0;
    const cancelable = (D.commitments||[]).filter(c=>c.cancelIfTight);

    budgetHtml += `<div class="card">
      <div class="section-title">Budget</div>`;

    if (isTight && cancelable.length) {
      budgetHtml += `<div class="tight-month-banner" style="margin-bottom:12px">🚨 <strong>Tight Month</strong> — Consider cancelling: ${cancelable.map(c=>c.name||c.subcategory).join(', ')}</div>`;
    }

    budgetEntries.forEach(([cat, b]) => {
      const spent   = txns.filter(t=>t.type==='expense'&&t.category===cat).reduce((s,t)=>s+ +t.amount,0);
      const pct     = b.limit>0 ? Math.min(110,(spent/b.limit)*100) : 0;
      const warn    = b.warnAt||80;
      const cls     = pct>=100?'over':pct>=warn?'warning':'safe';
      const color   = pct>=100?'var(--gumamela)':pct>=warn?'var(--calamansi-dark)':'var(--text-mid)';
      const remaining = b.limit - spent;
      budgetHtml += `<div class="budget-item">
        <div class="budget-header">
          <span class="budget-cat-name">${cat}</span>
          <span class="budget-amounts" style="color:${color}">${peso(spent)} <span style="color:var(--text-light)">/ ${peso(b.limit)}</span></span>
        </div>
        <div class="budget-track"><div class="budget-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="budget-pct">${pct>=100?`<span style="color:var(--gumamela)">Over by ${peso(Math.abs(remaining))}</span>`:remaining>0?`${peso(remaining)} remaining`:'Fully spent'}</div>
      </div>`;
    });

    budgetHtml += '</div>';
  }

  el.innerHTML = `
    <div class="month-nav">
      <button class="month-nav-btn" onclick="navDashMonth(-1)">‹</button>
      <span class="month-nav-label">${monthLabel(dashMonth)}</span>
      <button class="month-nav-btn" onclick="navDashMonth(1)">›</button>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">Income</div><div class="s-value c-income">${peso(s.income)}</div></div>
      <div class="summary-card"><div class="s-label">Total Expenses</div><div class="s-value c-expense">${peso(s.expense)}</div></div>
      <div class="summary-card"><div class="s-label">Fixed Expenses</div><div class="s-value c-expense" style="font-size:15px">${peso(s.fixed)}</div></div>
      <div class="summary-card"><div class="s-label">Variable Expenses</div><div class="s-value c-expense" style="font-size:15px">${peso(s.variable)}</div></div>
      <div class="summary-card"><div class="s-label">Savings Allocated</div><div class="s-value c-savings">${peso(s.savings)}</div></div>
      <div class="summary-card"><div class="s-label">Net Balance</div><div class="s-value ${s.net>=0?'c-positive':'c-negative'}">${peso(s.net)}</div></div>
    </div>
    ${momHtml}
    ${budgetHtml}
    ${catEntries.length ? `<div class="card" id="cat-spending-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin:0">Spending by Category</div>
        <button onclick="toggleCatBreakdown()" id="breakdown-toggle-btn" style="border:none;background:var(--sinag-dark);color:var(--pandan);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer">
          ${catBreakdownOpen ? 'Hide ▲' : 'Breakdown ▼'}
        </button>
      </div>
      <div class="chart-wrap"><canvas id="chart-breakdown"></canvas></div>
      <div id="cat-breakdown-list"></div>
    </div>` : ''}
    <div class="card"><div class="section-title">Last 6 Months</div><div class="chart-wrap"><canvas id="chart-trend"></canvas></div></div>
    <button class="btn btn-ghost" onclick="openClipboard('monthly')" style="margin-bottom:14px">📋 Analyze with Claude</button>
  `;

  setTimeout(() => { buildBreakdownChart(catEntries); buildTrendChart(); rebuildCatBreakdown(); }, 40);
}

function renderYearlyDash() {
  const el = document.getElementById('dash-content');
  const yr = new Date().getFullYear();
  const txns = D.transactions.filter(t => t.date && t.date.startsWith(yr + ''));
  const s = calcSummary(txns);
  const months = Array.from({length:12}, (_,i) => yr + '-' + String(i+1).padStart(2,'0'));
  const incData = months.map(mk => getMonthTxns(mk).filter(t=>t.type==='income').reduce((s,t)=>s+ +t.amount,0));
  const expData = months.map(mk => getMonthTxns(mk).filter(t=>t.type==='expense').reduce((s,t)=>s+ +t.amount,0));

  // Yearly category spending
  const catSpend = {};
  txns.filter(t => t.type==='expense').forEach(t => {
    catSpend[t.category||'Other'] = (catSpend[t.category||'Other']||0) + +t.amount;
  });
  const catEntries = Object.entries(catSpend).sort((a,b) => b[1]-a[1]);

  // Yearly budget (monthly × 12)
  const budgets = D.budgets || {};
  const budgetEntries = Object.entries(budgets);
  let yearlyBudgetHtml = '';
  if (budgetEntries.length) {
    yearlyBudgetHtml = `<div class="card"><div class="section-title">Annual Budget</div>`;
    budgetEntries.forEach(([cat, b]) => {
      const yearlyLimit = b.limit * 12;
      const spent = txns.filter(t => t.type==='expense' && t.category===cat).reduce((s,t) => s + +t.amount, 0);
      const pct  = yearlyLimit > 0 ? Math.min(110, (spent/yearlyLimit)*100) : 0;
      const warn = b.warnAt || 80;
      const cls  = pct>=100 ? 'over' : pct>=warn ? 'warning' : 'safe';
      const color = pct>=100 ? 'var(--gumamela)' : pct>=warn ? 'var(--calamansi-dark)' : 'var(--text-mid)';
      const remaining = yearlyLimit - spent;
      yearlyBudgetHtml += `<div class="budget-item">
        <div class="budget-header">
          <span class="budget-cat-name">${cat}</span>
          <span class="budget-amounts" style="color:${color}">${peso(spent)} <span style="color:var(--text-light)">/ ${peso(yearlyLimit)}</span></span>
        </div>
        <div class="budget-track"><div class="budget-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="budget-pct" style="display:flex;justify-content:space-between">
          <span style="color:var(--text-light);font-size:10px">Monthly limit: ${peso(b.limit)}</span>
          <span>${pct>=100 ? `<span style="color:var(--gumamela)">Over by ${peso(Math.abs(remaining))}</span>` : remaining>0 ? `${peso(remaining)} remaining` : 'Fully spent'}</span>
        </div>
      </div>`;
    });
    yearlyBudgetHtml += '</div>';
  }

  el.innerHTML = `
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">Total Income ${yr}</div><div class="s-value c-income">${peso(s.income)}</div></div>
      <div class="summary-card"><div class="s-label">Total Expenses</div><div class="s-value c-expense">${peso(s.expense)}</div></div>
      <div class="summary-card"><div class="s-label">Fixed Expenses</div><div class="s-value c-expense" style="font-size:15px">${peso(s.fixed)}</div></div>
      <div class="summary-card"><div class="s-label">Variable Expenses</div><div class="s-value c-expense" style="font-size:15px">${peso(s.variable)}</div></div>
      <div class="summary-card"><div class="s-label">Total Savings</div><div class="s-value c-savings">${peso(s.savings)}</div></div>
      <div class="summary-card"><div class="s-label">Net ${yr}</div><div class="s-value ${s.net>=0?'c-positive':'c-negative'}">${peso(s.net)}</div></div>
    </div>
    ${yearlyBudgetHtml}
    ${catEntries.length ? `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin:0">Spending by Category</div>
        <button onclick="toggleCatBreakdownYr()" id="breakdown-toggle-btn-yr" style="border:none;background:var(--sinag-dark);color:var(--pandan);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer">
          ${catBreakdownOpenYr ? 'Hide ▲' : 'Breakdown ▼'}
        </button>
      </div>
      <div class="chart-wrap"><canvas id="chart-breakdown-yr"></canvas></div>
      <div id="cat-breakdown-list-yr"></div>
    </div>` : ''}
    <div class="card"><div class="section-title">Income vs. Expenses ${yr}</div><div class="chart-wrap"><canvas id="chart-yearly"></canvas></div></div>
    <button class="btn btn-ghost" onclick="openClipboard('yearly')" style="margin-bottom:14px">📋 Analyze with Claude</button>
  `;

  setTimeout(() => {
    // Yearly line chart
    if (chartYearly) { chartYearly.destroy(); chartYearly=null; }
    const c = document.getElementById('chart-yearly');
    if (c) {
      chartYearly = new Chart(c, {
        type: 'line',
        data: {
          labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
          datasets: [
            { label:'Income',   data:incData, borderColor:'#1A9452', backgroundColor:'rgba(26,148,82,0.08)',  fill:true, tension:0.35, borderWidth:2.5, pointRadius:3 },
            { label:'Expenses', data:expData, borderColor:'#E84A4A', backgroundColor:'rgba(232,74,74,0.08)', fill:true, tension:0.35, borderWidth:2.5, pointRadius:3 }
          ]
        },
        options: chartOpts('line')
      });
    }
    // Yearly doughnut
    buildBreakdownChart(catEntries, 'chart-breakdown-yr');
    rebuildYearlyCatBreakdown(txns);
  }, 40);
}

function buildBreakdownChart(entries, canvasId, chartRef) {
  canvasId = canvasId || 'chart-breakdown';
  if (canvasId === 'chart-breakdown') { if (chartBreakdown) { chartBreakdown.destroy(); chartBreakdown=null; } }
  else { if (chartBreakdownYr) { chartBreakdownYr.destroy(); chartBreakdownYr=null; } }
  const c = document.getElementById(canvasId);
  if (!c || !entries.length) return;
  const colors = ['#1A9452','#E84A4A','#F2C12E','#4A90D9','#9B59B6','#E67E22','#1ABC9C','#E91E8C','#607D8B','#FF5722','#795548'];
  const chart = new Chart(c, {
    type: 'doughnut',
    data: { labels:entries.map(e=>e[0]), datasets:[{ data:entries.map(e=>e[1]), backgroundColor:colors.slice(0,entries.length), borderWidth:2, borderColor:'#FDFAF0' }] },
    options: { responsive:true, plugins:{ legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11},padding:10,boxWidth:12}}, tooltip:{callbacks:{label:ctx=>' '+peso(ctx.raw)}} } }
  });
  if (canvasId === 'chart-breakdown') chartBreakdown = chart;
  else chartBreakdownYr = chart;
}

function buildTrendChart() {
  if (chartTrend) { chartTrend.destroy(); chartTrend=null; }
  const c = document.getElementById('chart-trend');
  if (!c) return;
  const months = [];
  for (let i=5;i>=0;i--) {
    const [y,m] = dashMonth.split('-').map(Number);
    const d = new Date(y,m-1-i,1);
    months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
  }
  chartTrend = new Chart(c, {
    type:'bar',
    data: {
      labels: months.map(mk=>{const[y,m]=mk.split('-');return new Date(y,m-1).toLocaleDateString('en-PH',{month:'short'});}),
      datasets: [
        { label:'Income',   data:months.map(mk=>getMonthTxns(mk).filter(t=>t.type==='income').reduce((s,t)=>s+ +t.amount,0)),   backgroundColor:'#1A9452', borderRadius:5 },
        { label:'Expenses', data:months.map(mk=>getMonthTxns(mk).filter(t=>t.type==='expense').reduce((s,t)=>s+ +t.amount,0)), backgroundColor:'#E84A4A', borderRadius:5 }
      ]
    },
    options: chartOpts('bar')
  });
}

function chartOpts(type) {
  return {
    responsive:true,
    plugins:{
      legend:{position:'top',labels:{font:{family:'DM Sans',size:11},padding:12,boxWidth:12}},
      tooltip:{callbacks:{label:ctx=>' '+peso(ctx.raw)}}
    },
    scales: type!=='doughnut' ? {
      y:{ticks:{callback:v=>'₱'+(v>=1000?(v/1000).toFixed(0)+'k':v),font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
      x:{ticks:{font:{size:11}},grid:{display:false}}
    } : undefined
  };
}

// ─── CATEGORY DRILL-DOWN ─────────────────────────────

const CAT_COLORS = ['#1A9452','#E84A4A','#F2C12E','#4A90D9','#9B59B6','#E67E22','#1ABC9C','#E91E8C','#607D8B','#FF5722','#795548'];

function toggleCatExpand(cat, isYearly) {
  if (expandedCats.has(cat)) expandedCats.delete(cat);
  else expandedCats.add(cat);
  if (isYearly) {
    const yr = new Date().getFullYear();
    const txns = D.transactions.filter(t => t.date && t.date.startsWith(yr + ''));
    rebuildYearlyCatBreakdown(txns);
  } else {
    rebuildCatBreakdown();
  }
}

function toggleCatBreakdown() {
  catBreakdownOpen = !catBreakdownOpen;
  const btn = document.getElementById('breakdown-toggle-btn');
  if (btn) btn.textContent = catBreakdownOpen ? 'Hide ▲' : 'Breakdown ▼';
  rebuildCatBreakdown();
}

function toggleCatBreakdownYr() {
  catBreakdownOpenYr = !catBreakdownOpenYr;
  const btn = document.getElementById('breakdown-toggle-btn-yr');
  if (btn) btn.textContent = catBreakdownOpenYr ? 'Hide ▲' : 'Breakdown ▼';
  const yr  = new Date().getFullYear();
  const txns = D.transactions.filter(t => t.date && t.date.startsWith(yr + ''));
  rebuildYearlyCatBreakdown(txns);
}

function rebuildCatBreakdown() {
  const el = document.getElementById('cat-breakdown-list');
  if (!el) return;
  if (!catBreakdownOpen) { el.innerHTML = ''; return; }
  const txns = getMonthTxns(dashMonth);
  el.innerHTML = buildCatBreakdownHtml(txns);
}

function rebuildYearlyCatBreakdown(txns) {
  const el = document.getElementById('cat-breakdown-list-yr');
  if (!el) return;
  if (!catBreakdownOpenYr) { el.innerHTML = ''; return; }
  el.innerHTML = buildCatBreakdownHtml(txns, true);
}

function buildCatBreakdownHtml(txns, isYearly) {
  const catSpend = {}, subSpend = {};
  txns.filter(t => t.type === 'expense').forEach(t => {
    const cat = t.category || 'Other';
    const sub = t.subcategory || '—';
    catSpend[cat] = (catSpend[cat] || 0) + +t.amount;
    if (!subSpend[cat]) subSpend[cat] = {};
    subSpend[cat][sub] = (subSpend[cat][sub] || 0) + +t.amount;
  });

  const entries = Object.entries(catSpend).sort((a, b) => b[1] - a[1]);
  const total   = entries.reduce((s, e) => s + e[1], 0);
  if (!entries.length) return '';

  let html = `<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px">
    <div style="font-size:11px;color:var(--text-light);margin-bottom:8px;text-align:center;letter-spacing:0.04em">TAP A CATEGORY TO EXPAND</div>`;

  entries.forEach(([cat, amt], i) => {
    const pct   = total > 0 ? Math.round(amt / total * 100) : 0;
    const color = CAT_COLORS[i % CAT_COLORS.length];
    const isExp = expandedCats.has(cat);

    html += `<div class="cat-row" onclick="toggleCatExpand('${cat.replace(/'/g,"\\'")}', ${isYearly ? 'true' : 'false'})">
      <div class="cat-row-left">
        <div class="cat-dot" style="background:${color}"></div>
        <span class="cat-name">${cat}</span>
      </div>
      <div class="cat-row-right">
        <span class="cat-pct">${pct}%</span>
        <span class="cat-amt">${peso(amt)}</span>
        <span class="cat-chevron ${isExp ? 'open' : ''}">›</span>
      </div>
    </div>`;

    if (isExp && subSpend[cat]) {
      const subs = Object.entries(subSpend[cat]).sort((a, b) => b[1] - a[1]);
      subs.forEach(([sub, samt]) => {
        const spct   = amt > 0 ? Math.round(samt / amt * 100) : 0;
        const barPct = Math.min(100, spct);
        html += `<div class="subcat-row">
          <div class="subcat-bar-wrap">
            <div class="subcat-name">${sub}</div>
            <div class="subcat-bar"><div class="subcat-bar-fill" style="width:${barPct}%;background:${color}"></div></div>
          </div>
          <div class="subcat-right">
            <span class="subcat-pct">${spct}%</span>
            <span class="subcat-amt">${peso(samt)}</span>
          </div>
        </div>`;
      });
    }
  });

  html += '</div>';
  return html;
}

let pendingComId = null;
let billsSubTab = 'manual';

function switchBillsTab(tab) {
  billsSubTab = tab;
  renderCommitments();
}

function renderCommitments() {
  const el = document.getElementById('tab-commitments');
  const coms = D.commitments || [];

  const monthlyTotal = coms.reduce((s,c) => {
    let a = (+c.amount||0) + (c.type==='installment' ? (+c.interestPerTerm||0) : 0);
    if (c.billingCycle==='annual') a/=12;
    else if (c.billingCycle==='quarterly') a/=3;
    return s+a;
  }, 0);

  const overdueManual  = coms.filter(c => c.type==='manual-payment' && comIsOverdue(c));
  const manuals        = coms.filter(c => c.type==='manual-payment');
  const autos          = coms.filter(c => c.type==='auto-payment');
  const subs           = coms.filter(c => c.type==='subscription');
  const installs       = coms.filter(c => c.type==='installment');

  // Badge counts for tabs
  const manualBadge   = overdueManual.length ? `<span class="bills-tab-badge">${overdueManual.length}</span>` : '';
  const overdueAutos  = autos.filter(c => comIsOverdue(c)).length + subs.filter(c => comIsOverdue(c)).length;
  const autoBadge     = overdueAutos  ? `<span class="bills-tab-badge">${overdueAutos}</span>`  : '';
  const overdueInst   = installs.filter(c => comIsOverdue(c)).length;
  const instBadge     = overdueInst   ? `<span class="bills-tab-badge">${overdueInst}</span>`   : '';

  // ── HEADER ───────────────────────────────────────
  let html = `<div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div>
      <div style="font-size:11px;color:var(--text-light);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Monthly Committed</div>
      <div style="font-size:22px;font-weight:700;color:var(--gumamela)">${peso(monthlyTotal)}</div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openAddCom()">+ Add</button>
  </div>`;

  // ── INNER TABS ───────────────────────────────────
  html += `<div class="bills-tabs">
    <button class="bills-tab ${billsSubTab==='manual'?'active':''}" onclick="switchBillsTab('manual')">✍️ Manual${manualBadge}</button>
    <button class="bills-tab ${billsSubTab==='auto'?'active':''}"   onclick="switchBillsTab('auto')">⚡ Auto${autoBadge}</button>
    <button class="bills-tab ${billsSubTab==='installments'?'active':''}" onclick="switchBillsTab('installments')">📦 Installments${instBadge}</button>
  </div>`;

  // ── MANUAL PAYMENTS TAB ──────────────────────────
  if (billsSubTab === 'manual') {
    if (overdueManual.length) {
      html += `<div class="alert-banner danger" style="margin-bottom:12px">⚠️ ${overdueManual.length} payment${overdueManual.length>1?'s':''} not yet settled from last month.</div>`;
    }
    if (!manuals.length) {
      html += '<div class="empty-state"><div class="empty-icon">✍️</div><p>No manual payments set up yet.<br>Tap <strong>+ Add</strong> and choose Manual Payment.</p></div>';
    } else {
      // Sort: overdue first, then due this month, then paid
      const sorted = [
        ...manuals.filter(c => comIsOverdue(c)),
        ...manuals.filter(c => !comIsOverdue(c) && !comIsPaid(c)),
        ...manuals.filter(c => comIsPaid(c))
      ];
      sorted.forEach(c => {
        const paid    = comIsPaid(c);
        const overdue = comIsOverdue(c);
        const amtHtml = +c.amount > 0
          ? `<span class="check-amount">${peso(+c.amount)}</span>`
          : `<span class="check-amount zero">Set amount</span>`;
        const badgeHtml = overdue ? `<span class="overdue-badge">Overdue</span>` : paid ? `<span class="paid-badge">Paid</span>` : '';
        const boxCls  = paid ? 'check-box checked' : overdue ? 'check-box overdue' : 'check-box';
        const itemCls = paid ? 'check-item is-paid' : overdue ? 'check-item is-overdue' : 'check-item';
        const payInfo = paid    ? `Next due ${fmtDate(c.nextDueDate)}`
                      : overdue ? `Was due ${fmtDate(c.nextDueDate)}`
                                : `Due ${fmtDate(c.nextDueDate)||'this month'}`;
        html += `<div class="${itemCls}">
          <div class="${boxCls}" onclick="handleCheckboxClick('${c.id}')"></div>
          <div class="check-info" onclick="openEditCom('${c.id}')">
            <div class="check-name">${c.name||c.subcategory} ${badgeHtml}</div>
            <div class="check-meta">${payInfo}${c.paymentSource?' · '+c.paymentSource:''}</div>
          </div>
          ${amtHtml}
        </div>`;
      });
    }
  }

  // ── AUTO-PAYMENTS TAB (+ Subscriptions) ──────────
  if (billsSubTab === 'auto') {
    const hasContent = autos.length || subs.length;
    if (!hasContent) {
      html += '<div class="empty-state"><div class="empty-icon">⚡</div><p>No auto-payments or subscriptions yet.<br>Tap <strong>+ Add</strong> and choose Auto-Payment or Subscription.</p></div>';
    } else {
      if (autos.length) {
        html += `<div class="com-section-label">⚡ Auto-Payments</div>`;
        autos.forEach(c => { html += buildComItem(c); });
      }
      if (subs.length) {
        html += `<div class="com-section-label" style="margin-top:${autos.length?'20px':'0'}">🔄 Subscriptions</div>`;
        subs.forEach(c => { html += buildComItem(c); });
      }
    }
  }

  // ── INSTALLMENTS TAB ─────────────────────────────
  if (billsSubTab === 'installments') {
    if (!installs.length) {
      html += '<div class="empty-state"><div class="empty-icon">📦</div><p>No installments set up yet.<br>Tap <strong>+ Add</strong> and choose Installment.</p></div>';
    } else {
      // Summary card for installments
      const totalInstallAmt = installs.reduce((s,c) => s + (+c.amount||0) + (+c.interestPerTerm||0), 0);
      const totalPrincipal  = installs.reduce((s,c) => s + (+c.amount||0), 0);
      const totalInterest   = installs.reduce((s,c) => s + (+c.interestPerTerm||0), 0);
      html += `<div class="card" style="margin-bottom:14px">
        <div style="font-size:11px;color:var(--text-light);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Monthly Installment Total</div>
        <div style="font-size:22px;font-weight:700;color:var(--gumamela);margin-bottom:4px">${peso(totalInstallAmt)}</div>
        ${totalInterest>0?`<div style="font-size:12px;color:var(--text-light)">${peso(totalPrincipal)} principal + ${peso(totalInterest)} interest</div>`:''}
      </div>`;
      installs.forEach(c => { html += buildComItem(c); });
    }
  }

  el.innerHTML = html;
}

function buildComItem(c) {
  const t0 = today();
  const isOvd  = c.nextDueDate && c.nextDueDate < t0;
  const diff   = c.nextDueDate ? (new Date(c.nextDueDate)-new Date(t0))/86400000 : null;
  const isSoon = diff!==null && diff>=0 && diff<=7;
  const badge  = isOvd ? '<span class="due-badge overdue">Overdue</span>' : isSoon ? `<span class="due-badge due-soon">Due in ${Math.round(diff)}d</span>` : '';
  const logBtn = (isOvd||isSoon) ? `<button class="log-btn" onclick="event.stopPropagation();openConfirmPayment('${c.id}')">Log</button>` : '';

  const isInstall = c.type === 'installment';

  if (isInstall) {
    const monthly  = c.monthlyPayment || ((+c.amount||0) + (+c.interestPerTerm||0));
    const principal= c.amount || 0;
    const interest = c.interestPerTerm || 0;
    const hasAmt   = monthly > 0;

    // End date calc
    let endDateStr = '';
    if (c.nextDueDate && c.remainingTerms > 0) {
      const d = new Date(c.nextDueDate + 'T00:00:00');
      d.setMonth(d.getMonth() + (+c.remainingTerms));
      endDateStr = d.toLocaleDateString('en-PH', { month: 'short', year: 'numeric' });
    }

    const paid       = (+c.totalTerms||0) - (+c.remainingTerms||0);
    const pct        = c.totalTerms > 0 ? Math.min(100, (paid / c.totalTerms) * 100) : 0;
    const progressBar = c.totalTerms > 0 ? `
      <div style="margin-top:8px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);margin-bottom:3px">
          <span>${paid} of ${c.totalTerms} terms paid</span>
          <span>${pct.toFixed(0)}%</span>
        </div>
        <div style="height:5px;background:var(--sinag-dark);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:var(--pandan);border-radius:3px;transition:width 0.4s ease"></div>
        </div>
      </div>` : '';

    return `<div class="com-item" onclick="openEditCom('${c.id}')">
      <div class="com-left" style="flex:1;min-width:0">
        <div class="com-name">${c.name||c.subcategory||'Installment'}</div>
        <div class="com-meta">${c.subcategory?c.subcategory+' · ':''}${c.remainingTerms?c.remainingTerms+' terms left':''}${endDateStr?' · ends '+endDateStr:''}</div>
        ${progressBar}
        ${badge?`<div style="margin-top:5px">${badge}</div>`:''}
        ${logBtn?`<div style="margin-top:4px">${logBtn}</div>`:''}
      </div>
      <div class="com-right">
        ${hasAmt ? `
          <div class="com-amount">${peso(monthly)}</div>
          ${interest>0?`<div style="font-size:10px;color:var(--text-light);text-align:right;margin-top:2px;line-height:1.4">${peso(principal)} + ${peso(interest)}</div>`:''}
        ` : `<div class="com-amount zero">Set amounts</div>`}
        <div class="com-due">${c.nextDueDate?fmtDate(c.nextDueDate):''}</div>
      </div>
    </div>`;
  }

  // Standard non-installment item
  const interest = 0;
  const totalAmt = +c.amount||0;
  const hasAmt   = totalAmt > 0;
  const amtHtml  = hasAmt ? `<div class="com-amount">${peso(totalAmt)}</div>` : `<div class="com-amount zero">Set amount</div>`;

  return `<div class="com-item" onclick="openEditCom('${c.id}')">
    <div class="com-left">
      <div class="com-name">${c.name||c.subcategory||'Commitment'}</div>
      <div class="com-meta">${c.subcategory?c.subcategory+' · ':''}${c.billingCycle||'monthly'}${c.cancelIfTight?' · 🚩':''}</div>
      ${badge?`<div>${badge}</div>`:''}
      ${logBtn?`<div style="margin-top:4px">${logBtn}</div>`:''}
    </div>
    <div class="com-right">${amtHtml}<div class="com-due">${c.nextDueDate?fmtDate(c.nextDueDate):''}</div></div>
  </div>`;
}

function handleCheckboxClick(id) {
  const c = D.commitments.find(x=>x.id===id);
  if (!c) return;
  if (comIsPaid(c)) return; // already paid, clicking has no effect
  if (+c.amount === 0) {
    alert('Please set the amount for "' + (c.name||c.subcategory) + '" before logging payment.');
    openEditCom(id);
    return;
  }
  openConfirmPayment(id);
}

function openConfirmPayment(id) {
  const c = D.commitments.find(x=>x.id===id);
  if (!c) return;
  pendingComId = id;
  document.getElementById('confirm-text').textContent =
    `Log payment for "${c.name||c.subcategory}" — ${peso(c.amount)}${c.billingCycle!=='monthly'?' ('+c.billingCycle+')':''}.`;
  document.getElementById('confirm-date').value = today();
  document.getElementById('confirm-notes').value = '';

  // Payment source
  const sel = document.getElementById('confirm-pay-src');
  sel.innerHTML = '<option value="">Select method (optional)</option>';
  (D.paymentSources||[]).forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
  if (c.paymentSource) sel.value = c.paymentSource;

  openModal('modal-confirm');
}

function confirmLogPayment() {
  if (!pendingComId) return;
  const c = D.commitments.find(x=>x.id===pendingComId);
  if (!c) return;

  const payMethod = document.getElementById('confirm-pay-src').value;
  const date      = document.getElementById('confirm-date').value || today();
  const userNotes = document.getElementById('confirm-notes').value.trim();

  const isInstall     = c.type === 'installment';
  const monthlyAmt    = isInstall ? (c.monthlyPayment || (+c.amount||0) + (+c.interestPerTerm||0)) : (+c.amount||0);
  const interest      = isInstall ? (+c.interestPerTerm||0) : 0;
  const principal     = isInstall ? (+c.amount||0) : 0;
  const remAfter      = isInstall ? Math.max(0, (+c.remainingTerms||0) - 1) : null;

  let autoNote = 'Payment: ' + (c.name||c.subcategory);
  if (isInstall && interest > 0) {
    autoNote = `${c.name||c.subcategory} — ${peso(principal)} principal + ${peso(interest)} interest`;
    if (remAfter !== null) autoNote += ` · ${remAfter} terms remaining`;
  }

  D.transactions.unshift({
    id: uid(), type: 'expense', date, amount: monthlyAmt,
    category: c.category, subcategory: c.subcategory,
    tags: getTags(c.subcategory||''),
    paymentMethod: payMethod,
    notes: userNotes || autoNote
  });

  // Advance due date
  if (c.nextDueDate) {
    const d = new Date(c.nextDueDate + 'T00:00:00');
    if      (c.billingCycle==='annual')    d.setFullYear(d.getFullYear()+1);
    else if (c.billingCycle==='quarterly') d.setMonth(d.getMonth()+3);
    else                                   d.setMonth(d.getMonth()+1);
    c.nextDueDate = d.toISOString().split('T')[0];
  }
  if (isInstall && c.remainingTerms > 0) c.remainingTerms--;

  save();
  closeModal('modal-confirm');
  pendingComId = null;

  // Check if there are more overdue installments to prompt
  const nextOverdue = (D.commitments||[]).find(x => x.type==='installment' && comIsOverdue(x) && +x.monthlyPayment > 0);
  if (nextOverdue) {
    setTimeout(() => openConfirmPayment(nextOverdue.id), 300);
  } else {
    renderCommitments();
  }
}
