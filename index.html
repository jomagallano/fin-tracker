let csvValidRows = [];
let csvReviewRows = [];

function importCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = ''; // allow re-selecting same file
  const r = new FileReader();
  r.onload = ev => {
    try {
      const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { alert('CSV appears empty.'); return; }

      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const col = name => headers.indexOf(name.toLowerCase());

      const iDate = col('date'),   iType = col('type'),   iAmt  = col('amount');
      const iCat  = col('category'), iSub = col('subcategory');
      const iPay  = col('paymentmethod'), iInc = col('incomesource');
      const iGoal = col('savingsgoal'),   iNotes = col('notes');

      if (iDate===-1||iType===-1||iAmt===-1) {
        alert('Missing required columns: Date, Type, Amount.\nCheck the CSV format and try again.');
        return;
      }

      function parseRow(line) {
        const result=[]; let cur='', inQ=false;
        for (let i=0;i<line.length;i++) {
          const ch=line[i];
          if (ch==='"') { inQ=!inQ; }
          else if (ch===','&&!inQ) { result.push(cur.trim()); cur=''; }
          else { cur+=ch; }
        }
        result.push(cur.trim()); return result;
      }

      csvValidRows=[];
      csvReviewRows=[];

      for (let i=1;i<lines.length;i++) {
        const row  = parseRow(lines[i]);
        const get  = idx => (idx!==-1&&row[idx]!==undefined) ? row[idx].trim() : '';
        const rawDate=get(iDate), rawType=get(iType).toLowerCase(), rawAmt=get(iAmt);
        const rawCat=get(iCat),   rawSub=get(iSub);
        const issues=[];

        const dateOk = /^\d{4}-\d{2}-\d{2}$/.test(rawDate);
        if (!dateOk) issues.push('Date "'+rawDate+'" — should be YYYY-MM-DD');

        const typeOk = ['expense','income','savings'].includes(rawType);
        if (!typeOk) issues.push('Type "'+(get(iType)||'(empty)')+'" — should be Expense, Income, or Savings');

        const amt = parseFloat(rawAmt);
        const amtOk = !isNaN(amt) && amt > 0;
        if (!amtOk) issues.push('Amount "'+(rawAmt||'(empty)')+'" — should be a positive number');

        if (typeOk && rawType==='expense') {
          const cats = D.categories||{};
          const catOk = rawCat && cats[rawCat];
          if (!catOk) {
            issues.push('Category "'+(rawCat||'(empty)')+'" — not in category list');
          } else {
            const subOk = rawSub && cats[rawCat].includes(rawSub);
            if (!subOk) issues.push('Subcategory "'+(rawSub||'(empty)')+'" — not found under '+rawCat);
          }
        }

        if (issues.length===0) {
          csvValidRows.push(buildTxnFromRow(rawDate,rawType,amt,rawCat,rawSub,get(iPay),get(iInc),get(iGoal),get(iNotes)));
        } else {
          csvReviewRows.push({
            rowNum: i+1,
            issues,
            raw: { date:rawDate, type:get(iType), amount:rawAmt, category:rawCat, subcategory:rawSub, paymentMethod:get(iPay), incomeSource:get(iInc), savingsGoal:get(iGoal), notes:get(iNotes) },
            fixed: { date:dateOk?rawDate:'', type:typeOk?rawType:'expense', amount:amtOk?amt:'', category:rawCat||'', subcategory:rawSub||'', paymentMethod:get(iPay), incomeSource:get(iInc), savingsGoal:get(iGoal), notes:get(iNotes), skip:false }
          });
        }
      }

      if (csvReviewRows.length===0) {
        finalizeCsvImport(); // all clean, import directly
      } else {
        openCSVReview();
      }
    } catch(err) { alert('Failed to parse CSV: '+err.message); }
  };
  r.readAsText(file);
}

function buildTxnFromRow(date,type,amount,category,subcategory,paymentMethod,incomeSource,savingsGoal,notes) {
  const txn={id:uid(),type,amount,date,notes:notes||'',tags:[]};
  if (type==='expense') {
    txn.category=category; txn.subcategory=subcategory;
    txn.tags=getTags(subcategory); txn.paymentMethod=paymentMethod||'';
  } else if (type==='income') {
    txn.incomeSource=incomeSource||'Income';
  } else {
    const goal=(D.savingsGoals||[]).find(g=>g.name.toLowerCase()===(savingsGoal||'').toLowerCase());
    txn.savingsGoalId=goal?goal.id:'';
    txn.savingsGoalName=goal?goal.name:(savingsGoal||'Savings');
    if (goal) { if(!goal.contributions) goal.contributions=[]; goal.contributions.push({date,amount,transactionId:txn.id}); }
  }
  return txn;
}

function openCSVReview() {
  renderCSVReview();
  openModal('modal-csv-review');
}

function renderCSVReview() {
  const cats = D.categories||{};
  const total = csvValidRows.length + csvReviewRows.length;

  document.getElementById('csv-review-summary').innerHTML =
    `<strong style="color:var(--pandan)">${csvValidRows.length} of ${total} rows</strong> are clean and ready. ` +
    `The <strong>${csvReviewRows.length} row${csvReviewRows.length!==1?'s':''}</strong> below need attention — fix or skip each one.`;

  let html='';
  csvReviewRows.forEach((item,idx) => {
    const f=item.fixed;
    const cats2=D.categories||{};
    const catOpts=Object.keys(cats2).map(c=>`<option value="${c}"${f.category===c?' selected':''}>${c}</option>`).join('');
    const subOpts=f.category&&cats2[f.category] ? cats2[f.category].map(s=>`<option value="${s}"${f.subcategory===s?' selected':''}>${s}</option>`).join('') : '';
    const incOpts=(D.incomeSources||[]).map(s=>`<option value="${s}"${f.incomeSource===s?' selected':''}>${s}</option>`).join('');

    const hasDateIssue = !(/^\d{4}-\d{2}-\d{2}$/.test(item.raw.date));
    const hasTypeIssue = !['expense','income','savings'].includes(item.raw.type.toLowerCase());
    const hasAmtIssue  = isNaN(parseFloat(item.raw.amount))||parseFloat(item.raw.amount)<=0;
    const hasCatIssue  = f.type==='expense' && (!f.category||!cats2[f.category]);
    const hasSubIssue  = f.type==='expense' && f.category && cats2[f.category] && !cats2[f.category].includes(f.subcategory);

    html+=`<div id="review-item-${idx}" style="border:1.5px solid ${f.skip?'var(--border)':'var(--calamansi)'};border-radius:var(--radius-sm);padding:13px;margin-bottom:10px;background:${f.skip?'var(--sinag-dark)':'white'};transition:all 0.2s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <span style="font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em">Row ${item.rowNum}</span>
          <div style="font-size:12px;color:var(--text-mid);margin-top:2px;font-family:monospace">${item.raw.date||'?'} · ${item.raw.type||'?'} · ₱${item.raw.amount||'?'} · ${item.raw.category||'—'} › ${item.raw.subcategory||'—'}</div>
        </div>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:${f.skip?'var(--gumamela)':'var(--text-light)'};cursor:pointer;flex-shrink:0;margin-left:10px;white-space:nowrap">
          <input type="checkbox" ${f.skip?'checked':''} onchange="toggleCsvSkip(${idx},this.checked)"> Skip
        </label>
      </div>
      ${item.issues.map(iss=>`<div style="font-size:11px;color:var(--gumamela);margin-bottom:3px;line-height:1.4">⚠️ ${iss}</div>`).join('')}
      ${!f.skip ? `<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
        ${hasDateIssue?`<div class="form-group" style="margin:0"><label>Date (YYYY-MM-DD)</label><input type="date" value="${f.date}" onchange="setCsvFix(${idx},'date',this.value)"></div>`:''}
        ${hasTypeIssue?`<div class="form-group" style="margin:0"><label>Type</label><select onchange="setCsvFix(${idx},'type',this.value);renderCSVReview()"><option value="expense"${f.type==='expense'?' selected':''}>Expense</option><option value="income"${f.type==='income'?' selected':''}>Income</option><option value="savings"${f.type==='savings'?' selected':''}>Savings</option></select></div>`:''}
        ${hasAmtIssue?`<div class="form-group" style="margin:0"><label>Amount (₱)</label><input type="number" value="${f.amount}" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal" onchange="setCsvFix(${idx},'amount',parseFloat(this.value)||0)"></div>`:''}
        ${f.type==='expense'&&(hasCatIssue||hasSubIssue)?`
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="form-group" style="margin:0"><label>Category</label><select onchange="setCsvFix(${idx},'category',this.value);setCsvFix(${idx},'subcategory','');renderCSVReview()"><option value="">Select…</option>${catOpts}</select></div>
            <div class="form-group" style="margin:0"><label>Subcategory</label><select onchange="setCsvFix(${idx},'subcategory',this.value)"><option value="">Select…</option>${subOpts}</select></div>
          </div>`:''}
        ${f.type==='income'?`<div class="form-group" style="margin:0"><label>Income Source</label><select onchange="setCsvFix(${idx},'incomeSource',this.value)"><option value="">Select…</option>${incOpts}</select></div>`:''}
      </div>` : `<div style="font-size:12px;color:var(--text-light);margin-top:6px;font-style:italic">This row will be skipped.</div>`}
    </div>`;
  });

  document.getElementById('csv-review-content').innerHTML = html;
  updateCsvReviewCounts();
}

function setCsvFix(idx, field, value) {
  csvReviewRows[idx].fixed[field] = value;
  updateCsvReviewCounts();
}

function toggleCsvSkip(idx, skip) {
  csvReviewRows[idx].fixed.skip = skip;
  renderCSVReview();
}

function updateCsvReviewCounts() {
  const included = csvReviewRows.filter(r=>!r.fixed.skip).length;
  const total    = csvValidRows.length + included;
  const el = document.getElementById('csv-review-counts');
  if (el) el.textContent = `${total} transaction${total!==1?'s':''} will be imported (${csvValidRows.length} clean + ${included} from review)`;
}

function finalizeCsvImport() {
  const fixedTxns = csvReviewRows
    .filter(item => !item.fixed.skip)
    .map(item => {
      const f   = item.fixed;
      const amt = parseFloat(f.amount);
      if (!f.date||!/^\d{4}-\d{2}-\d{2}$/.test(f.date)) return null;
      if (!['expense','income','savings'].includes(f.type)) return null;
      if (isNaN(amt)||amt<=0) return null;
      return buildTxnFromRow(f.date,f.type,amt,f.category,f.subcategory,f.paymentMethod,f.incomeSource,f.savingsGoal,f.notes);
    })
    .filter(Boolean);

  const allNew = csvValidRows.concat(fixedTxns);
  const existing = new Set(D.transactions.map(t=>`${t.date}|${t.type}|${t.amount}|${t.category||''}|${t.subcategory||''}`));
  const fresh = allNew.filter(t => !existing.has(`${t.date}|${t.type}|${t.amount}|${t.category||''}|${t.subcategory||''}`));
  const dupeCount  = allNew.length - fresh.length;
  const skipCount  = csvReviewRows.filter(r=>r.fixed.skip).length;
  const invalidCount = csvReviewRows.filter(r=>!r.fixed.skip).length - fixedTxns.length;

  D.transactions = D.transactions.concat(fresh);
  save();
  closeModal('modal-csv-review');
  renderLog();

  let msg = `✅ Imported ${fresh.length} transaction${fresh.length!==1?'s':''}.`;
  if (dupeCount)    msg += `\n⏭ ${dupeCount} duplicate${dupeCount!==1?'s':''} skipped.`;
  if (skipCount)    msg += `\n🚫 ${skipCount} row${skipCount!==1?'s':''} manually skipped.`;
  if (invalidCount) msg += `\n⚠️ ${invalidCount} row${invalidCount!==1?'s':''} still had errors and were excluded.`;
  alert(msg);

  csvValidRows=[]; csvReviewRows=[];
}
function clearData() {
  if (!confirm('Clear ALL data? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  D = defaultData();
  logSearchQuery = '';
  switchTab('log');
}

function addCat()    { const v=(document.getElementById('newcat-input')||{}).value; if(!v||!v.trim()||D.categories[v.trim()]) return; D.categories[v.trim()]=[]; save(); buildSettingsList(); }

function addListItem() { const v=(document.getElementById('newitem-input')||{}).value; if(!v||!v.trim()) return; if(!D[slType]) D[slType]=[]; D[slType].push(v.trim()); save(); buildSettingsList(); }

function onSubChange()   {
  const sub=document.getElementById('txn-sub').value;
  const tags=getTags(sub);
  const tr=document.getElementById('tags-row'), pr=document.getElementById('pay-method-row');
  if(tags.length) { tr.style.display='block'; document.getElementById('txn-tags-display').innerHTML=tags.map(tag=>{const cls=tag==='#auto-payment'?'auto':tag==='#manual-payment'?'manual':tag==='#subscription'?'sub':'';return`<span class="tag ${cls}">${tag}</span>`;}).join(''); } else { tr.style.display='none'; }
  pr.style.display=isManual(sub)?'block':'none';
}
function populatePayMethods() { const s=document.getElementById('txn-pay-method'); s.innerHTML='<option value="">Select method</option>'; (D.paymentSources||[]).forEach(p=>s.innerHTML+=`<option value="${p}">${p}</option>`); }
function populateIncomeSrcs() { const s=document.getElementById('txn-income-src'); s.innerHTML='<option value="">Select source</option>'; (D.incomeSources||[]).forEach(x=>s.innerHTML+=`<option value="${x}">${x}</option>`); }
function populateGoalSelect() { const s=document.getElementById('txn-goal'); s.innerHTML='<option value="">Select goal</option>'; (D.savingsGoals||[]).forEach(g=>s.innerHTML+=`<option value="${g.id}">${g.name}</option>`); }

function saveTxn() {
  const amount=parseFloat(document.getElementById('txn-amount').value);
  const date=document.getElementById('txn-date').value;
  if(!amount||amount<=0||!date){alert('Please enter amount and date.');return;}
  const t={id:editTxnId||uid(),type:txnType,amount,date,notes:document.getElementById('txn-notes').value.trim()};
  if(txnType==='expense'){
    t.category=document.getElementById('txn-cat').value; t.subcategory=document.getElementById('txn-sub').value;
    t.tags=getTags(t.subcategory); t.paymentMethod=isManual(t.subcategory)?document.getElementById('txn-pay-method').value:'';
  } else if(txnType==='income'){
    t.incomeSource=document.getElementById('txn-income-src').value; t.tags=[];
  } else {
    t.savingsGoalId=document.getElementById('txn-goal').value;
    const goal=(D.savingsGoals||[]).find(g=>g.id===t.savingsGoalId);
    t.savingsGoalName=goal?goal.name:'Savings'; t.tags=[];
    if(goal){
      if(!goal.contributions) goal.contributions=[];
      if(editTxnId) goal.contributions=goal.contributions.filter(c=>c.transactionId!==editTxnId);
      goal.contributions.push({date,amount,transactionId:t.id});
    }
  }
  if(editTxnId){const idx=D.transactions.findIndex(x=>x.id===editTxnId);if(idx!==-1)D.transactions[idx]=t;}else{D.transactions.unshift(t);}
  save(); closeModal('modal-txn'); renderLog();
}
function deleteTxn() {
  if(!editTxnId||!confirm('Delete this transaction?')) return;
  const t=D.transactions.find(x=>x.id===editTxnId);
  if(t&&t.type==='savings'&&t.savingsGoalId){const g=(D.savingsGoals||[]).find(x=>x.id===t.savingsGoalId);if(g)g.contributions=(g.contributions||[]).filter(c=>c.transactionId!==editTxnId);}
  D.transactions=D.transactions.filter(x=>x.id!==editTxnId);
  save(); closeModal('modal-txn'); renderLog();
}

let editComId=null;

function openAddCom() {

}

function openAddComWithType(type) {

    'manual-payment':'Manual Payment','auto-payment':'Auto-Payment',
    'subscription':'Subscription','installment':'Installment'
  }[type];

function openEditCom(id) {
  const c = D.commitments.find(x => x.id===id); if (!c) return;
  editComId = id;
  document.getElementById('com-title').textContent = 'Edit Commitment';
  document.getElementById('com-name').value = c.name||'';
  document.getElementById('com-type').value = c.type||'manual-payment';
  document.getElementById('com-amount').value = c.amount||'';
  document.getElementById('com-cycle').value = c.billingCycle||'monthly';
  document.getElementById('com-due').value = c.nextDueDate||fomStr();

  document.getElementById('com-del-row').style.display = 'flex';

    document.getElementById('com-principal').value    = c.principalAmount||'';
    document.getElementById('com-total-repay').value  = c.totalRepayment||'';
    document.getElementById('com-total-terms').value  = c.totalTerms||'';
    document.getElementById('com-rem-terms').value    = c.remainingTerms||'';
    document.getElementById('com-start-date').value   = c.startDate||'';
  }
  populateComCats(); populateComPaySrcs(); onComTypeChange();
  setTimeout(() => {
    document.getElementById('com-cat').value = c.category||''; onComCatChange();

      document.getElementById('com-sub').value = c.subcategory||'';

      if (c.type==='installment') {
        document.getElementById('com-lending-src') && (document.getElementById('com-lending-src').value = '');
        updateInstallmentCalc();
      }
    }, 20);
  }, 20);

function onComTypeChange() {
  const type = document.getElementById('com-type').value;
  const isInstall = type === 'installment';
  document.getElementById('installment-fields').style.display = isInstall ? 'block' : 'none';
  document.getElementById('com-amount-row').style.display     = isInstall ? 'none'  : 'block';
  document.getElementById('com-cycle-row').style.display      = isInstall ? 'none'  : 'block';
  document.getElementById('com-tight-row').style.display      = isInstall ? 'none'  : 'flex';
  if (isInstall) { updateInstallmentCalc(); }
}

function updateInstallmentCalc() {
  const principal   = parseFloat(document.getElementById('com-principal').value)   || 0;
  const totalRepay  = parseFloat(document.getElementById('com-total-repay').value)  || 0;
  const totalTerms  = parseInt(document.getElementById('com-total-terms').value)    || 0;
  const remTerms    = parseInt(document.getElementById('com-rem-terms').value)      || 0;
  const startDate   = document.getElementById('com-start-date').value;
  const el          = document.getElementById('installment-calc');

  if (!principal || !totalRepay || !totalTerms) { el.style.display='none'; return; }

  const monthlyPayment   = totalRepay / totalTerms;
  const monthlyPrincipal = principal  / totalTerms;
  const monthlyInterest  = monthlyPayment - monthlyPrincipal;

  // End date from start date + total terms, or from next due date + remaining terms
  let endDateStr = '';
  if (startDate) {
    const d = new Date(startDate + 'T00:00:00');
    d.setMonth(d.getMonth() + totalTerms);
    endDateStr = d.toLocaleDateString('en-PH', { month: 'long', year: 'numeric' });
  } else if (remTerms > 0) {
    const due = document.getElementById('com-due').value;
    if (due) {
      const d = new Date(due + 'T00:00:00');
      d.setMonth(d.getMonth() + remTerms);
      endDateStr = d.toLocaleDateString('en-PH', { month: 'long', year: 'numeric' });
    }
  }

  el.style.display = 'block';
  el.innerHTML = `<div class="install-calc">
    <div class="install-calc-row"><span class="install-calc-label">Monthly Principal</span><span class="install-calc-val">${peso(monthlyPrincipal)}</span></div>
    <div class="install-calc-row"><span class="install-calc-label">Monthly Interest</span><span class="install-calc-val">${peso(monthlyInterest)}</span></div>
    ${endDateStr?`<div class="install-calc-row"><span class="install-calc-label">Estimated End</span><span class="install-calc-val">${endDateStr}</span></div>`:''}
    <div class="install-calc-row"><span class="install-calc-label">Monthly Payment</span><span class="install-calc-val">${peso(monthlyPayment)}</span></div>
  </div>`;
}

function saveCom() {
  const name = document.getElementById('com-name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  const type = document.getElementById('com-type').value;

  const c = {
    id: editComId||uid(), name, type,
    category:    document.getElementById('com-cat').value,
    subcategory: document.getElementById('com-sub').value,
    nextDueDate: document.getElementById('com-due').value,
    paymentSource: document.getElementById('com-pay-src').value,
    cancelIfTight: type !== 'installment' && document.getElementById('com-cancel-tight').checked
  };

  if (type === 'installment') {
    const principal  = parseFloat(document.getElementById('com-principal').value)   || 0;
    const totalRepay = parseFloat(document.getElementById('com-total-repay').value)  || 0;
    const totalTerms = parseInt(document.getElementById('com-total-terms').value)    || 0;
    const remTerms   = parseInt(document.getElementById('com-rem-terms').value)      || 0;
    if (!principal||!totalRepay||!totalTerms) { alert('Please enter Principal, Total Repayment, and Total Terms.'); return; }
    if (totalRepay < principal) { alert('Total Repayment cannot be less than Principal.'); return; }
    if (remTerms > totalTerms)  { alert('Remaining Terms cannot exceed Total Terms.'); return; }
    c.principalAmount  = principal;
    c.totalRepayment   = totalRepay;
    c.totalTerms       = totalTerms;
    c.remainingTerms   = remTerms;
    c.startDate        = document.getElementById('com-start-date').value;
    c.billingCycle     = 'monthly';
    // Derived per-term values used by log/display
    c.amount           = principal  / totalTerms;            // monthly principal
    c.interestPerTerm  = (totalRepay - principal) / totalTerms; // monthly interest
    c.monthlyPayment   = totalRepay / totalTerms;            // total monthly
  } else {
    const amount = parseFloat(document.getElementById('com-amount').value)||0;
    c.amount       = amount;
    c.billingCycle = document.getElementById('com-cycle').value;
  }

  if (editComId) {
    const idx = D.commitments.findIndex(x=>x.id===editComId);
    if (idx !== -1) D.commitments[idx] = c;
  } else {
    D.commitments.push(c);
  }
  save(); closeModal('modal-com'); renderCommitments();
}
function deleteCom() {
  if(!editComId||!confirm('Delete this commitment?')) return;
  D.commitments=D.commitments.filter(x=>x.id!==editComId);
  save(); closeModal('modal-com'); renderCommitments();
}

function openClipboard(type) {
  const yr=new Date().getFullYear();
  const txns=type==='monthly'?getMonthTxns(dashMonth):D.transactions.filter(t=>t.date&&t.date.startsWith(yr+''));
  const s=calcSummary(txns);
  const period=type==='monthly'?monthLabel(dashMonth):yr+' Full Year';
  const catSpend={}, subSpend={}, incSrcs={};
  txns.filter(t=>t.type==='expense').forEach(t=>{catSpend[t.category||'Other']=(catSpend[t.category||'Other']||0)+ +t.amount;const k=(t.category||'Other')+' > '+(t.subcategory||'—');subSpend[k]=(subSpend[k]||0)+ +t.amount;});
  txns.filter(t=>t.type==='income').forEach(t=>{incSrcs[t.incomeSource||'Income']=(incSrcs[t.incomeSource||'Income']||0)+ +t.amount;});
  const text=`BARYA TRACKER — ${period}\n${'='.repeat(44)}\nINCOME\n  Total: ₱${s.income.toLocaleString()}\n  ${Object.entries(incSrcs).map(([k,v])=>k+': ₱'+v.toLocaleString()).join('\n  ')}\n\nEXPENSES\n  Total:    ₱${s.expense.toLocaleString()}\n  Fixed:    ₱${s.fixed.toLocaleString()}\n  Variable: ₱${s.variable.toLocaleString()}\n\nSAVINGS ALLOCATED: ₱${s.savings.toLocaleString()}\nNET BALANCE:       ₱${s.net.toLocaleString()}\n\nSPENDING BY CATEGORY\n${Object.entries(catSpend).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`  ${k}: ₱${v.toLocaleString()}`).join('\n')}\n\nDETAILED BREAKDOWN\n${Object.entries(subSpend).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`  ${k}: ₱${v.toLocaleString()}`).join('\n')}\n\nTRANSACTIONS: ${txns.length}\n${'='.repeat(44)}\nPlease analyze my finances: patterns, concerns, and actionable recommendations.`;
  document.getElementById('clipboard-data').textContent=text;
  openModal('modal-clipboard');
}
function copyClipboard() {
  const text=document.getElementById('clipboard-data').textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>alert('Copied! Paste into Claude.ai.')).catch(fbCopy);}else{fbCopy();}
}
function fbCopy() { const el=document.getElementById('clipboard-data');const r=document.createRange();r.selectNodeContents(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand('copy');alert('Copied! Paste into Claude.ai.'); }
